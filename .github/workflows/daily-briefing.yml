name: Daily Briefing Pipeline

on:
  schedule:
    # Run at 01:00 UK time = 00:00 UTC (winter) / 01:00 BST (summer offset handled)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install edge-tts for podcast generation
        run: pip install edge-tts

      - name: Run full daily pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: wangst1994@gmail.com
          SITE_URL: https://diurna-datvince.vercel.app
        run: npx tsx scripts/daily-run.ts

      - name: Commit and push briefing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Daily Pulse Bot"
          git config user.email "bot@dailypulse.ai"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/Wangvinci/diurna.git
          git pull --rebase origin main
          git add src/data/briefings/ public/audio/
          git diff --staged --quiet || git commit -m "Daily briefing $(date +%Y-%m-%d)"
          git push
