name: Daily Briefing Pipeline

on:
  schedule:
    - cron: '0 0 * * *'   # 00:00 UTC daily
  workflow_dispatch:

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history so git merge always works

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install podcast dependencies
        run: |
          pip install edge-tts
          sudo apt-get install -y ffmpeg 2>/dev/null || true

      # ── Step 1: Generate briefing + podcast + email ──────────────────────────
      - name: Run full daily pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: wangst1994@gmail.com
          SITE_URL: https://diurna-datvince.vercel.app
        run: npx tsx scripts/daily-run.ts

      # ── Step 2: Commit briefing JSON ─────────────────────────────────────────
      - name: Commit briefing JSON
        timeout-minutes: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_TERMINAL_PROMPT: 0
        run: |
          DATE=$(date +%Y-%m-%d)
          JSON_FILE="src/data/briefings/${DATE}.json"

          if [ ! -f "${JSON_FILE}" ]; then
            echo "No briefing file found for ${DATE}, skipping commit."
            exit 0
          fi

          git config user.name "Daily Pulse Bot"
          git config user.email "bot@dailypulse.ai"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/Wangvinci/diurna.git

          git pull --rebase=false --no-edit origin main
          git add "${JSON_FILE}"
          git diff --staged --quiet && echo "Nothing to commit." && exit 0
          git commit -m "briefing: ${DATE}"
          git push origin main

      # ── Step 3: Upload audio to GitHub Release (always runs) ─────────────────
      - name: Upload audio to GitHub Release
        if: always()
        timeout-minutes: 8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          CN_FILE="public/audio/${DATE}-cn.mp3"
          EN_FILE="public/audio/${DATE}-en.mp3"
          TAG="audio-${DATE}"

          if [ ! -f "${CN_FILE}" ] && [ ! -f "${EN_FILE}" ]; then
            echo "No audio files found, skipping upload."
            exit 0
          fi

          gh release create "${TAG}" \
            --title "Audio ${DATE}" \
            --notes "Daily briefing audio for ${DATE}" \
            2>/dev/null || true

          [ -f "${CN_FILE}" ] && gh release upload "${TAG}" "${CN_FILE}" --clobber
          [ -f "${EN_FILE}" ] && gh release upload "${TAG}" "${EN_FILE}" --clobber
          echo "✓ Audio uploaded to release ${TAG}"
