name: Daily Briefing Pipeline

on:
  schedule:
    # Run at 01:00 UK time = 00:00 UTC (winter) / 01:00 BST (summer offset handled)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1  # Shallow clone — much faster

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install edge-tts for podcast generation
        run: pip install edge-tts

      - name: Run full daily pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: wangst1994@gmail.com
          SITE_URL: https://diurna-datvince.vercel.app
        run: npx tsx scripts/daily-run.ts

      - name: Commit briefing JSON
        timeout-minutes: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_TERMINAL_PROMPT: 0
        run: |
          git config user.name "Daily Pulse Bot"
          git config user.email "bot@dailypulse.ai"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/Wangvinci/diurna.git
          git fetch --depth=1 origin main
          git merge origin/main --no-edit --strategy-option=theirs
          git add src/data/briefings/
          git diff --staged --quiet || git commit -m "briefing: $(date +%Y-%m-%d)"
          git push

      - name: Upload audio to GitHub Release
        timeout-minutes: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          CN_FILE="public/audio/${DATE}-cn.mp3"
          EN_FILE="public/audio/${DATE}-en.mp3"
          TAG="audio-${DATE}"
          # Create release (ignore error if exists) then upload files
          gh release create "${TAG}" --title "Audio ${DATE}" --notes "Daily briefing audio for ${DATE}" 2>/dev/null || true
          [ -f "${CN_FILE}" ] && gh release upload "${TAG}" "${CN_FILE}" --clobber || true
          [ -f "${EN_FILE}" ] && gh release upload "${TAG}" "${EN_FILE}" --clobber || true
          echo "Audio uploaded to release ${TAG}"
